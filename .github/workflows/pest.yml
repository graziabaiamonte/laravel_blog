name: Run tests

on:
  push
  #   pull_request:
  #     branches:
  #       - main
#   push:
#     branches:
#       - testing

jobs:
  pest:
    name: Run Pest
    runs-on: ubuntu-latest
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: password

    services:
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravel
        ports:
          - 3306:3306
        # Set health checks to wait until mysql database has started
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read PHP version from composer.json
        id: php-version
        run: echo "version=$(jq -r '.require.php' composer.json | grep -oE '[0-9]+\.[0-9]+' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ steps.php-version.outputs.version }}
          extensions: ctype, curl, dom, fileinfo, filter, hash, imagick, json, mbstring, mysql, pcre, pdo, pdo_mysql, session, tokenizer, xml
          # coverage: xdebug
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          # Use composer.json for key, if composer.lock is not committed.
          # key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache PHP dependencies
        uses: actions/cache@v4
        id: vendor-cache
        with:
          path: vendor
          key: ${{ runner.OS }}-build-${{ hashFiles('**/composer.lock') }}

      - name: Install Composer dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache # can be used in conditional checks => if: steps.npm-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vite
        run: npm run build

      - name: Prepare Laravel application
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          # Override database settings for CI
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=laravel" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env
          php artisan key:generate

      - name: Wait for MySQL
        run: |
          for i in {30..0}; do
            if nc -z 127.0.0.1 3306; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i)"
            sleep 1
          done
          if [ "$i" = 0 ]; then
            echo "MySQL failed to start"
            exit 1
          fi

      - name: Clear Config
        run: php artisan config:clear

      - name: Run Migration
        run: php artisan migrate -v

      - name: Create storage folders
        run: mkdir -p storage/framework/{sessions,views,cache}

      - name: Set directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create Storage symlink
        run: php artisan storage:link

      - name: Run tests
        run: php artisan test --exclude-group=skip
